_version = 1
# repl crate 简体中文翻译（Jupyter REPL / notebook UI）。
# 注意：文件名带 `.zh-CN` 后缀，rust-i18n 依据文件主干解析 locale
# （`repl.zh-CN` -> locale `zh-CN`）；仅靠子目录名不会生效。
# 与 en/repl.en.toml 的 key 一一对应。

