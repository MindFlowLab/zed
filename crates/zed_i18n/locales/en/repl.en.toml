_version = 1
# English translations for the `repl` crate (Jupyter REPL / notebook UI).
# NOTE: filename carries the `.en` suffix so rust-i18n resolves the locale from
# the file stem (`repl.en` -> locale `en`); the subdirectory alone is not used
# for locale detection. Mirrors zh-CN/repl.zh-CN.toml.

