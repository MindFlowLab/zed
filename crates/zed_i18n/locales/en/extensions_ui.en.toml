basedpyright = "Basedpyright (Python language server) support is built-in to Zed!"
ruff = "Ruff (linter for Python) support is built-in to Zed!"
tailwind = "Tailwind CSS support is built-in to Zed!"
ty = "Ty (Python language server) support is built-in to Zed!"
git = "Zed comes with basic Git support—more features are coming in the future."
language_bash = "Shell support is built-in to Zed!"
language_c = "C support is built-in to Zed!"
language_cpp = "C++ support is built-in to Zed!"
language_go = "Go support is built-in to Zed!"
language_python = "Python support is built-in to Zed!"
language_react = "React support is built-in to Zed!"
language_rust = "Rust support is built-in to Zed!"
