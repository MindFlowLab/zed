_version = 1

# inspector_ui: GPUI inspector labels and tooltips (debug builds)
# GPUI 检查器标签与工具提示（调试构建）

[inspector_ui.toolbar]
pick_mode_tooltip = "Start inspector pick mode"
title = "GPUI Inspector"

[inspector_ui.element_id]
label = "Element ID"
instance = "Instance %{id}"
instance_tooltip = "Disambiguates elements from the same source location"
source_location_tooltip = "Click to open by running Zed CLI"
global_id_tooltip = "GlobalElementId of the nearest ancestor with an ID"

[inspector_ui.layout]
label = "Layout"
loading = "Loading..."
bounds = "Bounds: ⌜%{origin} - %{bottom_right}⌟"
size = "Size: %{size}"
content_size = "Content size: %{size}"
content_size_tooltip = "Size of the element's children"

[inspector_ui.style]
rust_label = "Rust Style"
json_label = "JSON Style"
reset_tooltip = "Reset style"
load_buffers_failed = "Failed to create buffers for style editing: %{err}"
