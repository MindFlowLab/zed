# English translations for the `terminal_view` crate (terminal panel / tab UI).
# NOTE: filename carries the `.en` suffix so rust-i18n resolves the locale from
# the file stem (`terminal_view.en` -> locale `en`); the subdirectory alone is
# not used for locale detection. Mirrors zh-CN/terminal_view.zh-CN.toml.

